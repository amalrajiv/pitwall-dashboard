<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pitwall — F1 Strategy Dashboard</title>
  <meta name="theme-color" content="#0b0d10" />
  <link rel="preconnect" href="https://api.openf1.org" />
  <link rel="preconnect" href="https://media.formula1.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=Saira+Condensed:wght@600;700;800;900&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=Saira+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e10600'/><text x='16' y='22' text-anchor='middle' font-family='Arial Black' font-size='18' fill='white'>F1</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body class="locked">
  <div class="gate" id="gate" aria-modal="true" role="dialog" aria-labelledby="gate-title">
    <div class="gate-bg" aria-hidden="true"></div>
    <div class="gate-card">
      <div class="gate-mark">F1</div>
      <h1 id="gate-title" class="gate-title">Pitwall</h1>
      <p class="gate-sub">Enter access key to continue</p>
      <form class="gate-form" id="gate-form" autocomplete="off" novalidate>
        <input
          type="password"
          class="gate-input"
          id="gate-input"
          placeholder="••••••••"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Access key"
          required
        />
        <button type="submit" class="gate-submit" aria-label="Unlock">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>
      <p class="gate-error" id="gate-error" aria-live="polite"></p>
      <p class="gate-foot">Strategy dashboard · powered by openf1.org</p>
    </div>
  </div>

  <a class="skip-link" href="#main">Skip to main</a>

  <button class="drawer-toggle" id="drawer-toggle" aria-label="Open menu" aria-expanded="false">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg>
  </button>

  <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
    <div class="brand">
      <span class="brand-mark">F1</span>
      <div class="brand-text">
        <strong>Pitwall</strong>
        <small>Strategy</small>
      </div>
    </div>

    <div class="picker-group" role="group" aria-label="Session picker">
      <label>
        <span>Year</span>
        <select id="year-select" aria-label="Year"></select>
      </label>
      <label>
        <span>Grand Prix</span>
        <select id="meeting-select" aria-label="Meeting"></select>
      </label>
      <label>
        <span>Session</span>
        <select id="session-select" aria-label="Session"></select>
      </label>
    </div>

    <nav class="navlist" role="tablist" aria-label="Sections">
      <div class="navsection">
        <h3>Race</h3>
        <button role="tab" data-tab="overview" aria-selected="true">
          <span class="ico">◉</span><span>Overview</span>
        </button>
        <button role="tab" data-tab="results">
          <span class="ico">▤</span><span>Results</span>
        </button>
        <button role="tab" data-tab="trace">
          <span class="ico">↗</span><span>Race Trace</span>
        </button>
      </div>

      <div class="navsection">
        <h3>Championship</h3>
        <button role="tab" data-tab="standings">
          <span class="ico">★</span><span>Standings</span>
        </button>
      </div>

      <div class="navsection">
        <h3>Drivers</h3>
        <button role="tab" data-tab="drivers">
          <span class="ico">☰</span><span>Drivers</span>
        </button>
        <button role="tab" data-tab="onboard">
          <span class="ico">◎</span><span>Onboard</span>
        </button>
        <button role="tab" data-tab="compare">
          <span class="ico">⇆</span><span>Compare</span>
        </button>
      </div>

      <div class="navsection">
        <h3>Lap analysis</h3>
        <button role="tab" data-tab="laps">
          <span class="ico">⌚</span><span>Lap Times</span>
        </button>
        <button role="tab" data-tab="sectors">
          <span class="ico">⊟</span><span>Sectors</span>
        </button>
      </div>

      <div class="navsection">
        <h3>Strategy</h3>
        <button role="tab" data-tab="stints">
          <span class="ico">●</span><span>Stints</span>
        </button>
        <button role="tab" data-tab="pits">
          <span class="ico">↺</span><span>Pit Stops</span>
        </button>
        <button role="tab" data-tab="overtakes">
          <span class="ico">▶</span><span>Overtakes</span>
        </button>
      </div>

      <div class="navsection">
        <h3>Communication</h3>
        <button role="tab" data-tab="control">
          <span class="ico">⚑</span><span>Race Control</span>
        </button>
        <button role="tab" data-tab="radio">
          <span class="ico">♪</span><span>Radio</span>
        </button>
      </div>

      <div class="navsection">
        <h3>Conditions</h3>
        <button role="tab" data-tab="weather">
          <span class="ico">☼</span><span>Weather</span>
        </button>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="cmdk-trigger" id="cmdk-trigger" aria-label="Open command palette">
        <span>Quick jump</span>
        <kbd>⌘K</kbd>
      </button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
        <svg class="ic-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke-linecap="round"/></svg>
        <svg class="ic-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-linejoin="round"/></svg>
      </button>
      <button class="theme-toggle" id="calendar-btn" aria-label="Open F1 calendar" title="F1 Calendar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6" stroke-linecap="round"/><line x1="8" y1="2" x2="8" y2="6" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </button>
      <button class="theme-toggle" id="lock-btn" aria-label="Lock dashboard" title="Lock">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4" stroke-linecap="round"/></svg>
      </button>
    </div>
  </aside>

  <div class="drawer-overlay" id="drawer-overlay" aria-hidden="true"></div>

  <main id="main">
    <div class="topstrip">
      <div class="topstrip-title" id="topstrip-title"></div>
      <div class="status" id="status" aria-live="polite"></div>
    </div>

    <section id="panel-overview" role="tabpanel" class="panel active"></section>
    <section id="panel-results" role="tabpanel" class="panel"></section>
    <section id="panel-drivers" role="tabpanel" class="panel"></section>
    <section id="panel-laps" role="tabpanel" class="panel"></section>
    <section id="panel-sectors" role="tabpanel" class="panel"></section>
    <section id="panel-trace" role="tabpanel" class="panel"></section>
    <section id="panel-standings" role="tabpanel" class="panel"></section>
    <section id="panel-onboard" role="tabpanel" class="panel"></section>
    <section id="panel-compare" role="tabpanel" class="panel"></section>
    <section id="panel-stints" role="tabpanel" class="panel"></section>
    <section id="panel-pits" role="tabpanel" class="panel"></section>
    <section id="panel-overtakes" role="tabpanel" class="panel"></section>
    <section id="panel-control" role="tabpanel" class="panel"></section>
    <section id="panel-radio" role="tabpanel" class="panel"></section>
    <section id="panel-weather" role="tabpanel" class="panel"></section>

    <footer class="footer">
      Data: <a href="https://openf1.org" target="_blank" rel="noreferrer noopener">openf1.org</a>
      &middot; Unofficial. Not affiliated with Formula 1.
    </footer>
  </main>

  <!-- F1 Calendar slide-over -->
  <div class="calendar-overlay" id="calendar-overlay" aria-hidden="true"></div>
  <aside class="calendar-panel" id="calendar-panel" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="calendar-title">
    <div class="side-panel-head">
      <h2 id="calendar-title">F1 Calendar <span class="cal-year-tag" id="calendar-year"></span></h2>
      <button class="icon-btn" id="calendar-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="calendar-body" id="calendar-body"></div>
  </aside>

  <!-- Driver side panel (slide-over) -->
  <div class="side-panel-overlay" id="side-panel-overlay" aria-hidden="true"></div>
  <aside class="side-panel" id="side-panel" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="side-panel-title">
    <div class="side-panel-head">
      <h2 id="side-panel-title">Driver</h2>
      <button class="icon-btn" id="side-panel-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="side-panel-body" id="side-panel-body"></div>
  </aside>

  <!-- Command palette -->
  <div class="cmdk-overlay" id="cmdk-overlay" aria-hidden="true"></div>
  <div class="cmdk" id="cmdk" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Quick jump">
    <div class="cmdk-input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg>
      <input type="text" id="cmdk-input" placeholder="Jump to driver, session, or section…" autocomplete="off" spellcheck="false" />
      <kbd>esc</kbd>
    </div>
    <ul id="cmdk-results" class="cmdk-results" role="listbox" aria-label="Results"></ul>
  </div>
</body>
</html>
